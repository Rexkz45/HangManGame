<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <img class="hangManPic" src="./assets/hangman-0.svg" alt="">
            <h2>Hang Man Game</h2>
        </div>
        <div class="right">
            <ul class="wordDisplay">
                <li class="letter"></li>
                <li class="letter"></li>
                <li class="letter"></li>
                <li class="letter"></li>
            </ul>
            <h4 class="hintDisplay">
                Hint: <b>whfasfjkhs</b>
            </h4>
            <h4 class="guessDisplay">
                incroect <b>0/6</b>
            </h4>
            <div class="keyboard">
                <button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button><button>1</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
